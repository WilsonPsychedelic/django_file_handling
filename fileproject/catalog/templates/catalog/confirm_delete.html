{% extends "catalog/base.html" %}

{% block title %}Delete {{ object.name }}{% endblock %}

{% block content %}
<h1>Delete {{ object.name }}?</h1>
<p>This action cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete!</button>
    <a href="{% url 'catalog:list' %}">Cancel</a>
</form>
{% endblock %}
